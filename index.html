<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex – Train Smarter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  .logo {
    width: 140px;
    height: 140px;
    border-radius: 32px;
    margin-bottom: 32px;
    box-shadow: 0 0 60px rgba(255, 90, 50, 0.3);
  }
  h1 {
    font-size: 2.4rem;
    font-weight: 700;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #FF5A32, #FF8C42);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tagline {
    font-size: 1.15rem;
    color: #aaa;
    max-width: 420px;
    line-height: 1.6;
    margin-bottom: 40px;
  }
  .tagline strong {
    color: #fff;
  }
  .cta {
    display: inline-block;
    padding: 14px 36px;
    background: linear-gradient(135deg, #FF5A32, #FF8C42);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 50px;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
  }
  .cta:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 30px rgba(255, 90, 50, 0.4);
  }
  .contact {
    font-size: 0.85rem;
    color: #666;
    margin-top: 16px;
  }
  .contact a {
    color: #FF8C42;
    text-decoration: none;
  }
  .contact a:hover { text-decoration: underline; }
  .badge { margin-top: 32px; opacity: 0.9; }
  .badge img { height: 50px; }
</style>
</head>
<body>
<img
  src="https://r2-pub.rork.com/projects/z1pmyt1d4oc6wrvyt0lcw/assets/d0d0fb19-6ede-424f-8ac7-1b7674cb9b90.png"
  alt="Apex Logo"
  class="logo"
/>

  AI-powered training that adapts to your body, your goals, and your grind — so every rep actually counts.
</p>
